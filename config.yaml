entity_id: "https://idp.cybeross.ru"
base_url: "https://idp.cybeross.ru"
listen_addr: ":5800"
hanko_api_url: "https://api.cybeross.ru"
key_path: "keys/idp.key"
cert_path: "keys/idp.crt"
# Prefer setting IDP_SESSION_KEY in .env (see .env.example); overrides this value at runtime.
session_key: "CHANGE-ME-TO-A-RANDOM-32-BYTE-KEY"

service_providers:
  - entity_id: "https://cybeross.ru"
    acs_url: "https://cybeross.ru/saml/acs"
    name: "CyberOS"

oidc_clients:
  - client_id: "fastygo"
    client_secret: "${OIDC_CLIENT_SECRET_FASTYGO}"
    redirect_uris:
      - "https://fastygo.ru/auth/callback"
    name: "fastygo"

hanko_admin_url: "http://hanko:8001"

features:
  allow_public_registration: false
  allow_oidc_registration: false
  allow_saml_registration: true
  admin_emails:
    - "admin@cybeross.ru"
