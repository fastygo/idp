<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberOS SSO - Signing Out</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0f1117;
            color: #e1e4e8;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            max-width: 420px;
            padding: 2rem;
            text-align: center;
        }
        p {
            color: #8b949e;
            margin: 0;
        }
    </style>
</head>
<body data-hanko-api="{{.HankoAPI}}" data-return-to="{{.ReturnTo}}">
    <div class="card">
        <h1>Signing out...</h1>
        <p>Closing your SSO session and returning to the application.</p>
    </div>
    <script>
        (async function () {
            const { hankoApi, returnTo } = document.body.dataset;
            try {
                await fetch(hankoApi.replace(/\/$/, "") + "/logout", {
                    method: "POST",
                    credentials: "include",
                    mode: "cors",
                });
            } catch (error) {
                console.error("Hanko logout failed", error);
            } finally {
                window.location.replace(returnTo);
            }
        })();
    </script>
</body>
</html>
