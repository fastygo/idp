<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberOS SSO — Sign In</title>
    <script type="module" src="{{.HankoAPI}}/frontend/hanko-elements.js" crossorigin="anonymous"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0f1117;
            color: #e1e4e8;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
        }
        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: #f0f6fc;
        }
        .loading {
            text-align: center;
            padding: 2rem;
            color: #8b949e;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>CyberOS SSO</h1>
        <div id="loading" class="loading">Loading authentication...</div>
        <hanko-auth api="{{.HankoAPI}}" style="display:none"></hanko-auth>
    </div>

    <script type="module">
        import { register } from "{{.HankoAPI}}/frontend/hanko-elements.js";

        await register("{{.HankoAPI}}", { shadow: false });

        document.getElementById("loading").style.display = "none";
        document.querySelector("hanko-auth").style.display = "block";

        document.addEventListener("hankoAuthSuccess", () => {
            window.location.href = "/sso/complete";
        });
    </script>
</body>
</html>
